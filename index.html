<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZAID Character Building Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>🤖 ZAID Character Building Chatbot</h1>

        <p>
            Character Building • Islamic Guidance • Motivation
        </p>

    </div>

    <div id="chat-box">

        <div class="bot">

            <strong>🤖 Bot</strong>

            <p>

Assalamu Alaikum!

Welcome to ZAID Character Building Chatbot.

I can help you with:

😊 Happiness

😔 Sadness

😠 Anger

😰 Stress

❤️ Honesty

🤲 Dua

📖 Quran

📚 Hadith

🕌 Seerah

👳 Sahaba

Ask me anything!

            </p>

        </div>

    </div>

    <div class="input-area">

        <input
            id="user-input"
            type="text"
            placeholder="Ask your question here..."
        >

        <button onclick="sendMessage()">

            Send

        </button>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
